# Solar system layout — all orbital bodies and sun properties.

sun:
  name: Sol
  color: [1.0, 0.95, 0.8]
  radius: 6.0
  glowColor: [1.0, 0.7, 0.3]
  glowRadius: 10.0
  coronaSpeed: 0.1

planets:
  - name: Venus
    configFile: planets/venus.yaml
    orbitRadius: 30.0
    orbitSpeed: 0.0           # static for editor
    phase: 0.8
    displayRadius: 1.90
    color: [0.85, 0.70, 0.35]
    noiseSeed: 999
    noiseFrequency: 2.2
    noiseThresholds: [0.15, 0.38, 0.62, 0.85]
    zoomMin: 1.5
    zoomMax: 6.0

  - name: Earth
    configFile: planets/earth.yaml
    orbitRadius: 50.0
    orbitSpeed: 0.0
    phase: 0.0
    displayRadius: 2.0
    color: [0.3, 0.6, 0.9]
    noiseSeed: 42
    noiseFrequency: 2.5
    noiseThresholds: [0.30, 0.45, 0.65, 0.82]
    zoomMin: 2.0
    zoomMax: 8.0
    moons:
      - name: Moon
        configFile: planets/moon.yaml
        orbitRadius: 6.0
