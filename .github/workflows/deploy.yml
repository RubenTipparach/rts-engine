name: Build & Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── WASM build + GitHub Pages deploy ───────────────────────────
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet workload install wasm-tools
      - run: dotnet publish src/RtsEngine.Wasm/RtsEngine.Wasm.csproj -c Release -o release --nologo
      - name: Rewrite base href for GitHub Pages
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" release/wwwroot/index.html
      - run: touch release/wwwroot/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy-pages:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Desktop builds (win/linux/osx) ────────────────────────────
  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: rts-engine-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact: rts-engine-win-x64
          - os: macos-latest
            rid: osx-x64
            artifact: rts-engine-osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish desktop app
        run: >
          dotnet publish src/RtsEngine.Desktop/RtsEngine.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}
